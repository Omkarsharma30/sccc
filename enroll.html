<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll - Study Care & Computer Classes</title>
    <link rel="stylesheet" href="./style_hidden.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <span class="logo-text">Study care & computer classes</span>
            </a>
        </div>
        <nav class="nav-menu">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#courses">Courses</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="enrollment-form section-padding">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Course Enrollment</h2>
                <p class="section-subtitle">Start Your Learning Journey Today</p>
            </div>

            <form id="enrollmentForm" class="enrollment-form" novalidate>
                <input type="hidden" name="access_key" value="Yjk4MDcxYmYtNDcxOS00MTJhLTg5ODAtNDkwOGQxYmUwZjA3">
                <input type="hidden" name="subject" value="New Course Enrollment Request">
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required 
                           minlength="2" pattern="[A-Za-z ]{2,50}"
                           title="Please enter a valid name (minimum 2 characters, letters only)">
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required
                           pattern="[0-9+\-\s()]{8,20}"
                           title="Please enter a valid phone number">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="courseType">Course Type *</label>
                    <select id="courseType" name="courseType" required>
                        <option value="">Select Course Type</option>
                        <option value="computer">Computer Courses</option>
                        <option value="academic">Academic Courses</option>
                    </select>
                    <span class="error-message" id="courseTypeError"></span>
                </div>

                <div class="form-group" id="computerCourseGroup" style="display: none;">
                    <label for="computerCourse">Select Computer Course *</label>
                    <select id="computerCourse" name="course">
                        <option value="">Choose a computer course...</option>
                        <option value="DCA">DCA (Diploma in Computer Applications)</option>
                        <option value="ADCA">ADCA (Advanced Diploma in Computer Applications)</option>
                        <option value="CCA">CCA (Certificate in Computer Applications)</option>
                        <option value="Web Design">Web Design & Development</option>
                        <option value="AutoCAD">AutoCAD Design</option>
                        <option value="Graphic Design">Graphic Design Suite</option>
                        <option value="Typing">Professional Typing Course</option>
                        <option value="MS Office">Advanced MS Office</option>
                        <option value="Tally">Tally with GST</option>
                        <option value="Programming">Programming Fundamentals</option>
                        <option value="Java">Java Programming</option>
                        <option value="Full Stack">Full Stack Web Development</option>
                        <option value="Digital Marketing">Digital Marketing</option>
                    </select>
                    <span class="error-message" id="computerCourseError"></span>
                </div>

                <div class="form-group" id="academicCourseGroup" style="display: none;">
                    <label for="academicCourse">Select Academic Course *</label>
                    <select id="academicCourse" name="course">
                        <option value="">Choose an academic course...</option>
                        <option value="Class 6">Class 6 - All Subjects</option>
                        <option value="Class 7">Class 7 - All Subjects</option>
                        <option value="Class 8">Class 8 - All Subjects</option>
                        <option value="Class 9">Class 9 - All Subjects</option>
                        <option value="Class 10">Class 10 - All Subjects</option>
                        <option value="Class 11 Science">Class 11 - Science Stream</option>
                        <option value="Class 11 Commerce">Class 11 - Commerce Stream</option>
                        <option value="Class 12 Science">Class 12 - Science Stream</option>
                        <option value="Class 12 Commerce">Class 12 - Commerce Stream</option>
                    </select>
                    <span class="error-message" id="academicCourseError"></span>
                </div>

                <div class="form-group">
                    <button type="submit" class="submit-button" id="submitButton">
                        <span class="button-text">Submit Enrollment</span>
                        <span class="button-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Processing...
                        </span>
                    </button>
                </div>

                <div id="enrollmentMessage" class="message-box" style="display: none;"></div>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Study Care & Computer Classes. All rights reserved.</p>
        </div>
    </footer>

    <script src="enroll.js"></script>
</body>
</html>
